kind = "web"
previewPath = "/"
title = "Optimax HR & Internship Platform"
version = "1.0.0"
id = "artifacts/hr-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19028

[services.development]
run = "pnpm --filter @workspace/hr-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hr-platform", "run", "build" ]
publicDir = "artifacts/hr-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19028"
BASE_PATH = "/"
